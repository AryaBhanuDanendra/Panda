<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Suara Spesial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff5f7;
            overflow-x: hidden;
        }
        .font-romance {
            font-family: 'Dancing Script', cursive;
        }
        .heart {
            position: absolute;
            color: #ff8da1;
            animation: float 6s linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        .envelope-shadow {
            box-shadow: 0 10px 30px rgba(255, 141, 161, 0.3);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #ff8da1 0%, #ff5e78 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        /* Pulse effect for audio button */
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 141, 161, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 141, 161, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 141, 161, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Background Hearts -->
    <div id="heart-container"></div>

    <div id="app" class="relative z-10 w-full max-w-md">
        <!-- Tampilan Awal -->
        <div id="welcome-screen" class="glass rounded-3xl p-10 text-center envelope-shadow transition-all duration-700">
            <div class="mb-6 inline-block">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-pink-500 animate-bounce" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
            <h1 class="font-romance text-4xl text-pink-600 mb-4">Hai Cantik...</h1>
            <p class="text-gray-600 mb-8 leading-relaxed">Seseorang menitipkan pesan suara rahasia untukmu. Ingin mendengarnya?</p>
            <button onclick="openLetter()" class="btn-gradient text-white font-semibold py-4 px-12 rounded-full shadow-lg transform transition active:scale-95">
                Buka Pesan ❤️
            </button>
        </div>

        <!-- Tampilan Audio (Muncul setelah di klik) -->
        <div id="audio-content" class="hidden glass rounded-3xl p-10 envelope-shadow transition-all duration-700 text-center">
            <h2 class="font-romance text-3xl text-pink-600 mb-8 italic">"Dengarkan dengan hati..."</h2>
            
            <div class="relative flex flex-col items-center">
                <!-- Foto Profil / Icon -->
                <div class="w-32 h-32 rounded-full border-4 border-pink-200 mb-6 flex items-center justify-center bg-pink-50 overflow-hidden shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-pink-300" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </div>

                <!-- Tombol Audio -->
                <button id="audio-btn" onclick="toggleAudio()" class="pulse-animation inline-flex items-center justify-center w-20 h-20 rounded-full bg-pink-500 text-white shadow-xl hover:bg-pink-600 transition-all relative z-10">
                    <span id="play-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </span>
                    <span id="pause-icon" class="hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </span>
                </button>

                <!-- Waveform simple visualizer -->
                <div class="flex gap-1 mt-8 h-8 items-center">
                    <div class="w-1 bg-pink-300 rounded-full animate-bounce" style="height: 40%; animation-delay: 0.1s"></div>
                    <div class="w-1 bg-pink-400 rounded-full animate-bounce" style="height: 70%; animation-delay: 0.2s"></div>
                    <div class="w-1 bg-pink-500 rounded-full animate-bounce" style="height: 100%; animation-delay: 0.3s"></div>
                    <div class="w-1 bg-pink-400 rounded-full animate-bounce" style="height: 70%; animation-delay: 0.4s"></div>
                    <div class="w-1 bg-pink-300 rounded-full animate-bounce" style="height: 40%; animation-delay: 0.5s"></div>
                </div>

                <p id="status-text" class="mt-6 text-pink-500 font-medium tracking-wide">Putar Pesan Suara</p>
                <input type="range" id="seek-slider" value="0" max="100" class="w-full mt-6 accent-pink-500 opacity-50">
            </div>
            
            <button onclick="resetApp()" class="mt-10 text-gray-400 text-xs w-full text-center hover:text-pink-400 uppercase tracking-widest">Tutup</button>
        </div>
    </div>

    <!-- AUDIO FILE LOKAL -->
    <!-- Ganti 'audio_kamu.mp3' dengan nama file audio kamu yang ada di folder yang sama -->
    <audio id="my-audio" src="SepenuhHati.mp3"></audio>

    <script>
        // Function to create floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.opacity = Math.random();
            document.getElementById('heart-container').appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        setInterval(createHeart, 400);

        function openLetter() {
            document.getElementById('welcome-screen').classList.add('scale-0', 'opacity-0');
            setTimeout(() => {
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('audio-content').classList.remove('hidden');
                document.getElementById('audio-content').classList.add('scale-100', 'opacity-100');
            }, 500);
        }

        function resetApp() {
            const audio = document.getElementById('my-audio');
            audio.pause();
            audio.currentTime = 0;
            updateUI(false);
            document.getElementById('audio-content').classList.add('hidden');
            document.getElementById('welcome-screen').classList.remove('hidden', 'scale-0', 'opacity-0');
        }

        // --- Audio Logic ---
        const audio = document.getElementById('my-audio');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const statusText = document.getElementById('status-text');
        const seekSlider = document.getElementById('seek-slider');
        const audioBtn = document.getElementById('audio-btn');

        function toggleAudio() {
            if (audio.paused) {
                audio.play().catch(e => {
                    alert("Pastikan file 'audio_kamu.mp3' sudah ada di folder yang sama ya!");
                });
                updateUI(true);
            } else {
                audio.pause();
                updateUI(false);
            }
        }

        function updateUI(playing) {
            if (playing) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                statusText.innerText = "Sedang didengarkan...";
                audioBtn.classList.remove('pulse-animation');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                statusText.innerText = "Pesan Berhenti";
                audioBtn.classList.add('pulse-animation');
            }
        }

        audio.addEventListener('timeupdate', () => {
            const value = (audio.currentTime / audio.duration) * 100;
            seekSlider.value = value || 0;
        });

        audio.addEventListener('ended', () => {
            updateUI(false);
            statusText.innerText = "Selesai didengarkan ❤️";
            seekSlider.value = 0;
        });

        seekSlider.addEventListener('input', () => {
            const time = (seekSlider.value / 100) * audio.duration;
            audio.currentTime = time;
        });
    </script>
</body>
</html>
