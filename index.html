<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodi Cinta Kita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffe9f3 0%, #fff5f8 100%);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .font-pacifico {
            font-family: 'Pacifico', cursive;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 182, 193, 0.5);
            border-radius: 30px;
        }

        /* Animasi Hati Melayang */
        .heart {
            position: fixed;
            font-size: 20px;
            color: #ff85a1;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            animation: float 6s linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Animasi Piringan Hitam */
        .disc-animation {
            animation: rotate 5s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .paused {
            animation-play-state: paused;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #ffe9f3;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffb6c1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Container Utama -->
    <div class="relative z-10 w-full max-w-md">
        
        <!-- Kartu Utama -->
        <div class="glass-card p-8 shadow-2xl text-center space-y-6">
            
            <!-- Header -->
            <div class="space-y-2">
                <h1 class="text-4xl font-pacifico text-pink-500">Melodi Cinta</h1>
                <p class="text-pink-400 text-sm font-semibold">"Setiap nada mengingatkanku padamu"</p>
            </div>

            <!-- Vinyl Player Visual -->
            <div class="relative mx-auto w-48 h-48 flex items-center justify-center">
                <div id="musicDisc" class="disc-animation paused absolute w-full h-full rounded-full bg-neutral-800 border-8 border-pink-200 shadow-xl flex items-center justify-center overflow-hidden">
                    <div class="w-16 h-16 bg-pink-100 rounded-full border-4 border-pink-400 z-10 flex items-center justify-center">
                        <i data-lucide="heart" class="text-pink-500 fill-pink-500 w-8 h-8"></i>
                    </div>
                    <!-- Mock CD Texture -->
                    <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle,rgba(255,255,255,0.8)_0%,transparent_70%)]"></div>
                </div>
            </div>

            <!-- Judul Lagu & Info -->
            <div class="space-y-1">
                <h2 id="songTitle" class="text-xl font-bold text-gray-700 truncate">Lagu Favorit Kita</h2>
                <p id="artistName" class="text-pink-400 text-sm uppercase tracking-widest">Pilih musikmu sendiri</p>
            </div>

            <!-- Kontrol Audio -->
            <div class="flex flex-col items-center gap-4">
                <audio id="mainAudio" class="hidden"></audio>
                
                <div class="flex items-center gap-6">
                    <button id="playPauseBtn" class="w-16 h-16 bg-pink-500 hover:bg-pink-600 text-white rounded-full flex items-center justify-center shadow-lg transition-transform active:scale-90">
                        <i id="playIcon" data-lucide="play" class="w-8 h-8 fill-white"></i>
                    </button>
                </div>

                <!-- Progress Bar -->
                <div class="w-full space-y-1">
                    <input type="range" id="progressBar" value="0" class="w-full accent-pink-500 cursor-pointer h-2 bg-pink-200 rounded-lg appearance-none">
                    <div class="flex justify-between text-xs text-pink-400 font-bold">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
            </div>

            <!-- Fitur Custom Audio -->
            <div class="pt-6 border-t border-pink-100">
                <p class="text-xs text-pink-400 mb-3 font-semibold">Ganti dengan lagu pilihanmu:</p>
                <label for="audioUpload" class="cursor-pointer flex items-center justify-center gap-2 bg-pink-50 hover:bg-pink-100 text-pink-500 border border-pink-200 py-2 px-4 rounded-full text-sm transition-colors">
                    <i data-lucide="music" class="w-4 h-4"></i>
                    Pilih File MP3
                </label>
                <input type="file" id="audioUpload" accept="audio/*" class="hidden">
            </div>

            <!-- Pesan Cinta -->
            <div class="mt-4 p-4 bg-white/50 rounded-2xl border border-pink-100">
                <p class="text-gray-600 text-sm italic">
                    "Terima kasih telah menjadi bagian terindah dalam simfoni hidupku."
                </p>
            </div>

        </div>

        <!-- Footer -->
        <p class="text-center mt-6 text-pink-400 text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-1">
            Dibuat dengan <i data-lucide="heart" class="w-3 h-3 fill-pink-400"></i> untukmu
        </p>
    </div>

    <script>
        // Inisialisasi Ikon Lucide
        lucide.createIcons();

        const audio = document.getElementById('mainAudio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const audioUpload = document.getElementById('audioUpload');
        const songTitle = document.getElementById('songTitle');
        const artistName = document.getElementById('artistName');
        const musicDisc = document.getElementById('musicDisc');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');

        let isPlaying = false;

        // Fungsi Play/Pause
        function togglePlay() {
            if (!audio.src) {
                alert("Silakan pilih lagu terlebih dahulu ya!");
                return;
            }

            if (isPlaying) {
                audio.pause();
                playIcon.setAttribute('data-lucide', 'play');
                musicDisc.classList.add('paused');
            } else {
                audio.play();
                playIcon.setAttribute('data-lucide', 'pause');
                musicDisc.classList.remove('paused');
            }
            isPlaying = !isPlaying;
            lucide.createIcons();
        }

        playPauseBtn.addEventListener('click', togglePlay);

        // Upload Audio Custom
        audioUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audio.src = url;
                
                // Update judul lagu dari nama file
                const nameWithoutExt = file.name.split('.').slice(0, -1).join('.');
                songTitle.innerText = nameWithoutExt;
                artistName.innerText = "Lagu Pilihanmu";
                
                // Reset state
                isPlaying = false;
                togglePlay();
            }
        });

        // Update Progress Bar
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress || 0;
            
            currentTimeEl.innerText = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.innerText = formatTime(audio.duration);
        });

        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Hati Melayang
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 400);

        // Auto restart jika lagu habis
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playIcon.setAttribute('data-lucide', 'play');
            musicDisc.classList.add('paused');
            lucide.createIcons();
        });
    </script>
</body>
</html>
